<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">TunD terminal UI preview</title>
  <desc id="desc">A stylized terminal preview showing TunD server status, connected peers, traffic counters and recent events.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14181b"/>
      <stop offset="1" stop-color="#0f1215"/>
    </linearGradient>
    <style>
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .label { fill: #6b7379; font-size: 18px; }
      .text { fill: #f2f3f4; font-size: 20px; }
      .muted { fill: #a8b0b6; font-size: 18px; }
      .blue { fill: #85B7EB; }
      .green { fill: #5CD39A; }
      .yellow { fill: #E3B85C; }
    </style>
  </defs>

  <rect width="1040" height="560" rx="28" fill="#0c0f12"/>
  <rect x="18" y="18" width="1004" height="524" rx="20" fill="url(#bg)" stroke="#333a40" stroke-width="2"/>

  <circle cx="48" cy="48" r="8" fill="#e16b6b"/>
  <circle cx="76" cy="48" r="8" fill="#e3b85c"/>
  <circle cx="104" cy="48" r="8" fill="#5cd39a"/>
  <text x="520" y="56" text-anchor="middle" class="mono label">tund-cli server</text>

  <text x="54" y="108" class="mono blue" font-size="28">TunD</text>
  <text x="135" y="108" class="mono yellow" font-size="28">v1.19</text>
  <line x1="54" y1="132" x2="986" y2="132" stroke="#333a40" stroke-width="2"/>

  <text x="54" y="178" class="mono label">UDP</text>
  <text x="190" y="178" class="mono text">9909</text>
  <text x="54" y="216" class="mono label">TUN</text>
  <text x="190" y="216" class="mono text">utun5</text>
  <text x="54" y="254" class="mono label">Virtual</text>
  <text x="190" y="254" class="mono text">10.9.0.1/255.255.255.0</text>
  <text x="54" y="292" class="mono label">Uptime</text>
  <text x="190" y="292" class="mono text">00:14:32</text>

  <text x="54" y="352" class="mono blue" font-size="22">Peers (3)</text>
  <text x="54" y="390" class="mono label">Status</text>
  <text x="185" y="390" class="mono label">Virtual IP</text>
  <text x="380" y="390" class="mono label">Name</text>
  <text x="590" y="390" class="mono label">KA RTT</text>
  <text x="715" y="390" class="mono label">In</text>
  <text x="820" y="390" class="mono label">Out</text>
  <text x="925" y="390" class="mono label">Last</text>

  <circle cx="65" cy="424" r="7" fill="#5CD39A"/>
  <text x="88" y="431" class="mono text">online</text>
  <text x="185" y="431" class="mono text">10.9.0.2</text>
  <text x="380" y="431" class="mono text">Helm</text>
  <text x="590" y="431" class="mono text">18ms</text>
  <text x="715" y="431" class="mono text">1.2MB</text>
  <text x="820" y="431" class="mono text">980KB</text>
  <text x="925" y="431" class="mono text">now</text>

  <circle cx="65" cy="462" r="7" fill="#5CD39A"/>
  <text x="88" y="469" class="mono text">online</text>
  <text x="185" y="469" class="mono text">10.9.0.3</text>
  <text x="380" y="469" class="mono text">Weapons</text>
  <text x="590" y="469" class="mono text">23ms</text>
  <text x="715" y="469" class="mono text">842KB</text>
  <text x="820" y="469" class="mono text">1.1MB</text>
  <text x="925" y="469" class="mono text">1s</text>

  <circle cx="65" cy="500" r="7" fill="#E3B85C"/>
  <text x="88" y="507" class="mono text">stale</text>
  <text x="185" y="507" class="mono text">10.9.0.4</text>
  <text x="380" y="507" class="mono text">Science</text>
  <text x="590" y="507" class="mono text">41ms</text>
  <text x="715" y="507" class="mono text">512KB</text>
  <text x="820" y="507" class="mono text">744KB</text>
  <text x="925" y="507" class="mono text">12s</text>
</svg>
