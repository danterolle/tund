name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make
      - run: make test
      - run: make sanitize
      - uses: actions/upload-artifact@v4
        with:
          name: tund-linux-x86_64
          path: tund

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: make
      - run: make test
      - run: make sanitize
      - uses: actions/upload-artifact@v4
        with:
          name: tund-darwin-arm64
          path: tund

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make
            unzip
            zip
            curl
      - run: make
      - run: ./tund.exe --help
      - name: Download wintun.dll
        shell: msys2 {0}
        env:
          WINTUN_URL: https://www.wintun.net/builds/wintun-0.14.1.zip
          WINTUN_SHA256: 07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51
        run: |
          curl -fsSL "$WINTUN_URL" -o /tmp/wintun.zip
          echo "$WINTUN_SHA256  /tmp/wintun.zip" | sha256sum -c -
          unzip -o /tmp/wintun.zip wintun/bin/amd64/wintun.dll -d /tmp >/dev/null
          cp /tmp/wintun/bin/amd64/wintun.dll .
      - run: zip tund-windows-x86_64.zip tund.exe wintun.dll
      - uses: actions/upload-artifact@v4
        with:
          name: tund-windows-x86_64
          path: tund-windows-x86_64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mkdir release
          cp tund-linux-x86_64/tund                    release/tund-linux-x86_64
          cp tund-darwin-arm64/tund                    release/tund-darwin-arm64
          cp tund-windows-x86_64/tund-windows-x86_64.zip release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
